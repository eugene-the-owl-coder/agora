version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agora-postgres
    environment:
      POSTGRES_USER: agora
      POSTGRES_PASSWORD: agora_dev
      POSTGRES_DB: agora
    ports:
      - "5432:5432"
    volumes:
      - agora_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agora"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  agora_pgdata:
