[build]
builder = "nixpacks"
buildCommand = "npm ci --include=dev && npx prisma generate && npx tsc && cp -r src/public dist/public && cp -r src/idl dist/idl"

[deploy]
startCommand = "./start.sh"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
